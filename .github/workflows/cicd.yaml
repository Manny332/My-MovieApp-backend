name: Build and push


on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: checkout the repository
      uses: actions/checkout@v2

    - name: Run tests
      run: mvn test 

    - name: Docker build
      run: |  
        docker build -t my-movieapp-backend:latest .

 